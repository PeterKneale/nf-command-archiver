name: build

on:
  push:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      # The shipped project has no committed wrapper; bootstrap one with the
      # runner's preinstalled Gradle. No-op once you commit gradlew.
      - name: Generate Gradle wrapper if missing
        run: '[ -f gradlew ] || gradle wrapper'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Assemble
        run: ./gradlew assemble

      - name: Test
        run: ./gradlew test

      # Optional end-to-end check: install the plugin and run the validation
      # pipeline so a real run exercises the observer. Remove if not wanted.
      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          sudo mv nextflow /usr/local/bin/nextflow

      - name: Install plugin into local Nextflow
        run: ./gradlew install

      - name: Run validation pipeline
        working-directory: validation
        run: nextflow run main.nf
